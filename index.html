<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注音小英雄 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --sun: #FFD700;
    --grass: #5DBB63;
    --cloud: #FFFDE7;
    --red: #FF5252;
    --orange: #FF9800;
    --yellow: #FFC107;
    --green: #66BB6A;
    --blue: #42A5F5;
    --purple: #AB47BC;
    --pink: #EC407A;
    --teal: #26C6DA;
    --card-bg: #FFFDE7;
    --shadow: 0 8px 0px rgba(0,0,0,0.15);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', 'Noto Sans TC', sans-serif;
    background: linear-gradient(180deg, #a8edff 0%, #c8f7c5 100%);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Clouds animation */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    animation: drift linear infinite;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud-1 { width: 120px; height: 40px; top: 8%; animation-duration: 30s; }
  .cloud-1::before { width: 60px; height: 55px; top: -30px; left: 15px; }
  .cloud-1::after { width: 45px; height: 45px; top: -22px; left: 55px; }

  .cloud-2 { width: 90px; height: 30px; top: 15%; animation-duration: 45s; animation-delay: -15s; }
  .cloud-2::before { width: 45px; height: 42px; top: -22px; left: 10px; }
  .cloud-2::after { width: 35px; height: 35px; top: -18px; left: 40px; }

  .cloud-3 { width: 150px; height: 50px; top: 5%; animation-duration: 60s; animation-delay: -30s; }
  .cloud-3::before { width: 70px; height: 65px; top: -35px; left: 20px; }
  .cloud-3::after { width: 55px; height: 55px; top: -28px; left: 70px; }

  @keyframes drift {
    from { transform: translateX(-200px); }
    to { transform: translateX(110vw); }
  }

  /* Stars */
  .stars-container {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 100;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
    z-index: 10;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 0 10px;
  }
  .title {
    font-size: 2.8rem;
    font-weight: 900;
    color: white;
    text-shadow: 0 4px 0 rgba(0,0,0,0.15), 0 0 30px rgba(255,255,100,0.4);
    letter-spacing: 2px;
    line-height: 1.1;
  }
  .subtitle {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.9);
    margin-top: 6px;
    font-weight: 700;
  }

  /* Score & Progress */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    padding: 12px 20px;
    margin: 15px 0;
    box-shadow: var(--shadow);
  }
  .score-box {
    text-align: center;
  }
  .score-label {
    font-size: 0.75rem;
    color: #888;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .score-value {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--orange);
    line-height: 1;
  }

  .hearts {
    display: flex;
    gap: 6px;
    font-size: 1.6rem;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1));
  }
  .heart { transition: all 0.3s; }
  .heart.lost { filter: grayscale(1); opacity: 0.3; }

  /* Progress bar */
  .progress-wrap {
    background: rgba(0,0,0,0.1);
    border-radius: 20px;
    height: 12px;
    overflow: hidden;
    flex: 1;
    margin: 0 15px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, #FFD700, #FF9800);
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 10px rgba(255,200,0,0.5);
  }

  /* Game modes */
  .mode-selector {
    display: flex;
    gap: 10px;
    margin: 10px 0;
  }
  .mode-btn {
    flex: 1;
    padding: 12px 8px;
    border: none;
    border-radius: 15px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.15);
    position: relative;
  }
  .mode-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
  .mode-btn.active { transform: translateY(2px); box-shadow: 0 3px 0 rgba(0,0,0,0.15); }
  .mode-btn:nth-child(1) { background: #FF7043; color: white; }
  .mode-btn:nth-child(2) { background: #7C4DFF; color: white; }
  .mode-btn:nth-child(3) { background: #00BCD4; color: white; }

  /* Question card */
  .question-card {
    background: white;
    border-radius: 30px;
    padding: 30px 20px;
    text-align: center;
    box-shadow: 0 10px 0 rgba(0,0,0,0.12);
    margin: 15px 0;
    position: relative;
    overflow: hidden;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: linear-gradient(90deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF);
  }

  .question-label {
    font-size: 0.85rem;
    color: #aaa;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .big-char {
    font-size: 5rem;
    font-weight: 900;
    line-height: 1;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .question-word {
    font-size: 2.5rem;
    font-weight: 900;
    color: #333;
    margin: 5px 0;
  }

  .question-hint {
    font-size: 1.1rem;
    color: #666;
    margin-top: 8px;
  }

  @keyframes popIn {
    from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }

  /* Emoji display */
  .emoji-display {
    font-size: 3.5rem;
    margin: 5px 0;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Answer choices */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 10px 0;
  }

  .choice-btn {
    background: var(--card-bg);
    border: 4px solid transparent;
    border-radius: 20px;
    padding: 18px 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    position: relative;
    overflow: hidden;
  }

  .choice-btn .choice-sub {
    font-size: 0.8rem;
    color: #999;
    font-weight: 700;
  }

  .choice-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 rgba(0,0,0,0.12);
    border-color: #FFD700;
  }

  .choice-btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.12);
  }

  .choice-btn.correct {
    background: #E8F5E9;
    border-color: #66BB6A;
    animation: correctPulse 0.4s ease;
  }

  .choice-btn.wrong {
    background: #FFEBEE;
    border-color: #EF5350;
    animation: shake 0.4s ease;
  }

  .choice-btn.reveal {
    background: #E8F5E9;
    border-color: #66BB6A;
    opacity: 0.6;
  }

  @keyframes correctPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  /* Feedback overlay */
  .feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 200;
    font-size: 5rem;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
  }
  .feedback.show { transform: translate(-50%, -50%) scale(1); }
  .feedback.hide { transform: translate(-50%, -50%) scale(0) rotate(20deg); opacity: 0; }

  /* Next button */
  .next-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 7px 0 #D04030;
    transition: all 0.15s;
    letter-spacing: 1px;
    display: none;
    margin-top: 10px;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 9px 0 #D04030; }
  .next-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #D04030; }
  .next-btn.show { display: block; animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Result screen */
  .result-screen {
    display: none;
    text-align: center;
    background: white;
    border-radius: 30px;
    padding: 40px 20px;
    box-shadow: 0 10px 0 rgba(0,0,0,0.12);
    margin: 15px 0;
  }
  .result-screen.show { display: block; animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .result-emoji { font-size: 5rem; margin-bottom: 10px; }
  .result-title { font-size: 2rem; font-weight: 900; color: #333; margin-bottom: 10px; }
  .result-score { font-size: 3rem; font-weight: 900; color: var(--orange); }
  .result-msg { color: #666; font-size: 1rem; margin: 10px 0 20px; font-weight: 700; }

  .play-again-btn {
    padding: 16px 40px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #66BB6A, #43A047);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 6px 0 #2E7D32;
    transition: all 0.15s;
  }
  .play-again-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2E7D32; }

  /* Floating star animation */
  .float-star {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 300;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    from { transform: translateY(0) scale(1); opacity: 1; }
    to { transform: translateY(-150px) scale(0.5); opacity: 0; }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 500;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Sound toggle */
  .sound-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(255,255,255,0.8);
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 3px 6px rgba(0,0,0,0.15);
    z-index: 50;
    transition: all 0.2s;
  }
  .sound-toggle:hover { transform: scale(1.1); }

  /* Phonetic guide */
  .phonetic-guide {
    background: rgba(255,255,255,0.6);
    border-radius: 15px;
    padding: 12px 16px;
    margin: 8px 0;
    font-size: 0.85rem;
    color: #555;
    font-weight: 700;
    display: none;
  }
  .phonetic-guide.show { display: block; }
  .phonetic-guide span { color: var(--purple); font-size: 1.1rem; }

  /* Level badge */
  .level-badge {
    display: inline-block;
    background: linear-gradient(135deg, #FFD700, #FF9800);
    color: white;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.8rem;
    font-weight: 900;
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
    margin-bottom: 5px;
  }

  /* Streak display */
  .streak {
    font-size: 0.95rem;
    color: #FF5722;
    font-weight: 900;
    text-align: center;
    min-height: 24px;
    transition: all 0.3s;
  }

  @media (max-width: 400px) {
    .title { font-size: 2rem; }
    .big-char { font-size: 4rem; }
    .choice-btn { font-size: 1.6rem; padding: 14px 8px; }
  }
</style>
</head>
<body>

<!-- Clouds -->
<div class="cloud cloud-1" style="left:-150px"></div>
<div class="cloud cloud-2" style="left:30%"></div>
<div class="cloud cloud-3" style="left:60%"></div>

<div class="stars-container" id="starsContainer"></div>

<button class="sound-toggle" id="soundToggle" title="音效開關">🔊</button>

<div class="container">
  <div class="header">
    <div class="level-badge" id="levelBadge">⭐ 初學者</div>
    <div class="title">注音小英雄</div>
    <div class="subtitle">🌈 學注音，超厲害！</div>
  </div>

  <div class="hud">
    <div class="score-box">
      <div class="score-label">分數</div>
      <div class="score-value" id="scoreDisplay">0</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="hearts" id="heartsDisplay">
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
    </div>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('match')" id="modeMatch">🔤 認注音</button>
    <button class="mode-btn" onclick="setMode('word')" id="modeWord">🖼️ 看圖答</button>
    <button class="mode-btn" onclick="setMode('sound')" id="modeSound">👂 聽音答</button>
  </div>

  <div id="gameArea">
    <div class="question-card" id="questionCard">
      <div class="question-label" id="questionLabel">這個注音念什麼？</div>
      <div class="big-char" id="bigChar">ㄅ</div>
      <div class="emoji-display" id="emojiDisplay"></div>
      <div class="question-hint" id="questionHint"></div>
    </div>

    <div class="streak" id="streakDisplay"></div>

    <div class="choices" id="choices"></div>

    <div class="phonetic-guide" id="phoneticGuide">
      💡 提示：<span id="guideText"></span>
    </div>

    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">下一題 →</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">好棒！你做到了！</div>
    <div class="result-score" id="resultScore">0 分</div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="play-again-btn" onclick="startGame()">再玩一次 🔄</button>
  </div>
</div>

<div class="feedback" id="feedback">✅</div>

<script>
// ===== DATA =====
const bopomofo = [
  { char: 'ㄅ', name: '玻', sound: 'b', word: '爸爸', emoji: '👨', example: '爸(ㄅ)爸愛你' },
  { char: 'ㄆ', name: '坡', sound: 'p', word: '蘋果', emoji: '🍎', example: '(ㄆ)蘋果很好吃' },
  { char: 'ㄇ', name: '摸', sound: 'm', word: '貓咪', emoji: '🐱', example: '(ㄇ)貓咪喵喵叫' },
  { char: 'ㄈ', name: '佛', sound: 'f', word: '飛機', emoji: '✈️', example: '(ㄈ)飛機飛很高' },
  { char: 'ㄉ', name: '得', sound: 'd', word: '大象', emoji: '🐘', example: '(ㄉ)大象鼻子長' },
  { char: 'ㄊ', name: '特', sound: 't', word: '兔子', emoji: '🐰', example: '(ㄊ)兔子耳朵長' },
  { char: 'ㄋ', name: '訥', sound: 'n', word: '牛奶', emoji: '🥛', example: '(ㄋ)牛奶白白的' },
  { char: 'ㄌ', name: '勒', sound: 'l', word: '老虎', emoji: '🐯', example: '(ㄌ)老虎好威猛' },
  { char: 'ㄍ', name: '哥', sound: 'g', word: '狗狗', emoji: '🐶', example: '(ㄍ)狗狗汪汪叫' },
  { char: 'ㄎ', name: '科', sound: 'k', word: '恐龍', emoji: '🦕', example: '(ㄎ)恐龍好大隻' },
  { char: 'ㄏ', name: '喝', sound: 'h', word: '河馬', emoji: '🦛', example: '(ㄏ)河馬嘴巴大' },
  { char: 'ㄐ', name: '基', sound: 'j', word: '雞蛋', emoji: '🥚', example: '(ㄐ)雞蛋圓圓的' },
  { char: 'ㄑ', name: '欺', sound: 'q', word: '企鵝', emoji: '🐧', example: '(ㄑ)企鵝會游泳' },
  { char: 'ㄒ', name: '希', sound: 'x', word: '西瓜', emoji: '🍉', example: '(ㄒ)西瓜甜又大' },
  { char: 'ㄓ', name: '知', sound: 'zh', word: '蜘蛛', emoji: '🕷️', example: '(ㄓ)蜘蛛結網網' },
  { char: 'ㄔ', name: '吃', sound: 'ch', word: '車子', emoji: '🚗', example: '(ㄔ)車子嘟嘟跑' },
  { char: 'ㄕ', name: '詩', sound: 'sh', word: '獅子', emoji: '🦁', example: '(ㄕ)獅子吼一聲' },
  { char: 'ㄖ', name: '日', sound: 'r', word: '熱狗', emoji: '🌭', example: '(ㄖ)熱狗真好吃' },
  { char: 'ㄗ', name: '資', sound: 'z', word: '斑馬', emoji: '🦓', example: '(ㄗ)紫色多美麗' },
  { char: 'ㄘ', name: '雌', sound: 'c', word: '草莓', emoji: '🍓', example: '(ㄘ)草莓紅又甜' },
  { char: 'ㄙ', name: '思', sound: 's', word: '蔬菜', emoji: '🥦', example: '(ㄙ)蔬菜吃了壯' },
];

// Game state
let state = {
  mode: 'match',
  score: 0,
  hearts: 3,
  streak: 0,
  total: 10,
  current: 0,
  answered: false,
  soundOn: true,
  currentQuestion: null,
  history: [],
};

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function getRandom(arr, n) {
  return shuffle(arr).slice(0, n);
}

function getWrong(correct, pool, n) {
  return shuffle(pool.filter(x => x.char !== correct.char)).slice(0, n);
}

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, type, duration, gain = 0.3) {
  if (!state.soundOn) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.connect(g);
    g.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

function playCorrect() {
  playTone(523, 'sine', 0.1);
  setTimeout(() => playTone(659, 'sine', 0.1), 80);
  setTimeout(() => playTone(784, 'sine', 0.2), 160);
}

function playWrong() {
  playTone(300, 'sawtooth', 0.2, 0.2);
  setTimeout(() => playTone(250, 'sawtooth', 0.2, 0.2), 100);
}

function playClick() {
  playTone(440, 'sine', 0.05, 0.15);
}

// ===== QUESTION GENERATION =====
function generateQuestion() {
  const correct = bopomofo[Math.floor(Math.random() * bopomofo.length)];
  const wrongs = getWrong(correct, bopomofo, 3);
  const choices = shuffle([correct, ...wrongs]);
  return { correct, choices };
}

// ===== UI UPDATES =====
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('progressBar').style.width = `${(state.current / state.total) * 100}%`;

  const hearts = document.querySelectorAll('.heart');
  hearts.forEach((h, i) => {
    h.classList.toggle('lost', i >= state.hearts);
  });

  const levels = ['⭐ 初學者', '🌟 努力中', '💫 進步中', '✨ 好厲害', '🏆 注音王'];
  const lvl = Math.min(Math.floor(state.score / 30), 4);
  document.getElementById('levelBadge').textContent = levels[lvl];
}

function renderQuestion() {
  const q = generateQuestion();
  state.currentQuestion = q;
  state.answered = false;

  const { correct } = q;
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  setTimeout(() => { card.style.animation = ''; }, 10);

  const bigChar = document.getElementById('bigChar');
  const emojiDisplay = document.getElementById('emojiDisplay');
  const questionLabel = document.getElementById('questionLabel');
  const questionHint = document.getElementById('questionHint');
  const phoneticGuide = document.getElementById('phoneticGuide');
  const guideText = document.getElementById('guideText');

  phoneticGuide.classList.remove('show');

  if (state.mode === 'match') {
    // Show the zhuyin, ask what it is
    bigChar.textContent = correct.char;
    bigChar.style.color = `hsl(${Math.random()*360}, 70%, 50%)`;
    bigChar.style.display = 'block';
    emojiDisplay.style.display = 'none';
    questionLabel.textContent = '這個注音念什麼？';
    questionHint.textContent = '';

    // Render choices as word + emoji
    renderChoices(q, (c) => `
      <div style="font-size:1.8rem">${c.emoji}</div>
      <div>${c.word}</div>
      <div class="choice-sub">${c.char}</div>
    `, (btn, c, isCorrect) => {
      // highlight correct
      if (isCorrect) {
        guideText.textContent = `${correct.char} 念「${correct.name}」，像${correct.emoji}${correct.word}的開頭`;
        phoneticGuide.classList.add('show');
      }
    });

  } else if (state.mode === 'word') {
    // Show emoji/word, ask which zhuyin
    bigChar.style.display = 'none';
    emojiDisplay.style.display = 'block';
    emojiDisplay.textContent = correct.emoji;
    questionLabel.textContent = `「${correct.word}」的開頭注音是？`;
    questionHint.textContent = '';

    renderChoices(q, (c) => `
      <div>${c.char}</div>
      <div class="choice-sub">${c.name}</div>
    `, (btn, c, isCorrect) => {
      if (isCorrect) {
        guideText.textContent = `${correct.word}的開頭是 ${correct.char}，念「${correct.name}」`;
        phoneticGuide.classList.add('show');
      }
    });

  } else if (state.mode === 'sound') {
    // Show phonetic name, ask zhuyin symbol
    bigChar.style.display = 'block';
    bigChar.textContent = `「${correct.name}」`;
    bigChar.style.fontSize = '3rem';
    bigChar.style.color = '#333';
    emojiDisplay.style.display = 'none';
    questionLabel.textContent = '哪個注音念這個音？';
    questionHint.textContent = `發音：${correct.sound}`;

    renderChoices(q, (c) => `
      <div>${c.char}</div>
    `, (btn, c, isCorrect) => {
      if (isCorrect) {
        guideText.textContent = `${correct.char} 念「${correct.name}」，例：${correct.example}`;
        phoneticGuide.classList.add('show');
      }
    });
  }

  document.getElementById('nextBtn').classList.remove('show');
}

function renderChoices(q, template, onReveal) {
  const container = document.getElementById('choices');
  container.innerHTML = '';

  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = template(c);
    const isCorrect = c.char === q.correct.char;

    btn.onclick = () => {
      if (state.answered) return;
      state.answered = true;
      playClick();
      handleAnswer(btn, isCorrect, q, onReveal);
    };
    container.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect, q, onReveal) {
  const allBtns = document.querySelectorAll('.choice-btn');

  if (isCorrect) {
    btn.classList.add('correct');
    state.score += 10 + (state.streak >= 2 ? 5 : 0);
    state.streak++;
    playCorrect();
    showFeedback('⭐');
    spawnStars(btn);
    if (state.streak >= 3) {
      document.getElementById('streakDisplay').textContent = `🔥 連續答對 ${state.streak} 題！+${5 * (state.streak-2)} 分bonus！`;
    }
  } else {
    btn.classList.add('wrong');
    state.streak = 0;
    state.hearts = Math.max(0, state.hearts - 1);
    playWrong();
    showFeedback('💔');
    document.getElementById('streakDisplay').textContent = '';

    // reveal correct
    allBtns.forEach(b => {
      const charEl = b.querySelector('.choice-sub') || b.querySelector('div:first-child');
      // find the correct button
    });
  }

  // Reveal correct answer to all buttons
  allBtns.forEach(b => {
    b.disabled = true;
    // Check if this button is the correct one by looking at char in its content
    const isThisCorrect = q.choices.find((c, i) => {
      const btnList = document.querySelectorAll('.choice-btn');
      return btnList[i] === b && c.char === q.correct.char;
    });
  });

  // Find and highlight correct button
  const correctIdx = q.choices.findIndex(c => c.char === q.correct.char);
  if (correctIdx !== -1) {
    allBtns[correctIdx].classList.add(isCorrect ? 'correct' : 'reveal');
    onReveal(allBtns[correctIdx], q.correct, isCorrect);
  }

  updateHUD();
  state.current++;

  if (state.hearts <= 0 || state.current >= state.total) {
    setTimeout(showResult, 1200);
  } else {
    document.getElementById('nextBtn').classList.add('show');
  }
}

// ===== FEEDBACK =====
function showFeedback(emoji) {
  const fb = document.getElementById('feedback');
  fb.textContent = emoji;
  fb.className = 'feedback show';
  setTimeout(() => {
    fb.className = 'feedback hide';
    setTimeout(() => { fb.className = 'feedback'; }, 300);
  }, 600);
}

function spawnStars(btn) {
  const rect = btn.getBoundingClientRect();
  const emojis = ['⭐', '✨', '🌟', '💫'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const star = document.createElement('div');
      star.className = 'float-star';
      star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      star.style.left = (rect.left + Math.random() * rect.width) + 'px';
      star.style.top = rect.top + 'px';
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 1000);
    }, i * 80);
  }
}

function launchConfetti() {
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF9A3C','#C77DFF'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      c.style.width = c.style.height = (8 + Math.random() * 12) + 'px';
      c.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3500);
    }, i * 40);
  }
}

// ===== GAME FLOW =====
function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  const map = { match: 'modeMatch', word: 'modeWord', sound: 'modeSound' };
  document.getElementById(map[mode]).classList.add('active');
  playClick();
  startGame();
}

function startGame() {
  state.score = 0;
  state.hearts = 3;
  state.streak = 0;
  state.current = 0;
  state.answered = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('gameArea').style.display = 'block';
  document.getElementById('streakDisplay').textContent = '';
  updateHUD();
  renderQuestion();
}

function nextQuestion() {
  playClick();
  document.getElementById('phoneticGuide').classList.remove('show');
  document.getElementById('streakDisplay').textContent = '';
  renderQuestion();
}

function showResult() {
  document.getElementById('gameArea').style.display = 'none';
  const rs = document.getElementById('resultScreen');
  rs.classList.add('show');

  const score = state.score;
  let emoji, title, msg;

  if (score >= 120) {
    emoji = '🏆'; title = '超級注音王！'; msg = '你真的太厲害了！所有注音都難不倒你！';
    launchConfetti();
  } else if (score >= 80) {
    emoji = '🌟'; title = '做得很棒！'; msg = '你認識好多注音了，繼續加油！';
  } else if (score >= 50) {
    emoji = '😊'; title = '還不錯喔！'; msg = '再多練習幾次就會更厲害！';
  } else {
    emoji = '💪'; title = '繼續努力！'; msg = '多多練習注音，你一定可以的！';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = score + ' 分';
  document.getElementById('resultMsg').textContent = msg;
}

// ===== SOUND TOGGLE =====
document.getElementById('soundToggle').onclick = () => {
  state.soundOn = !state.soundOn;
  document.getElementById('soundToggle').textContent = state.soundOn ? '🔊' : '🔇';
};

// ===== INIT =====
startGame();
</script>
